version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rangeops
      POSTGRES_PASSWORD: rangeops
      POSTGRES_DB: rangeops
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"

volumes:
  pg_data:
